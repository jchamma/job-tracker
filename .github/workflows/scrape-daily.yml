name: Scrape jobs daily

on:
  schedule:
    # Runs at 07:00 UTC = 10:00 Israel (winter) / 10:00 Israel (summer, since IST = UTC+3 in summer it'll be 10:00)
    - cron: '0 7 * * *'
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: write  # needed to commit jobs.json back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit changes
        run: |
          git config user.name "Job Tracker Bot"
          git config user.email "actions@github.com"
          git add data/jobs.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Daily update $(date -u +'%Y-%m-%d')"
            git push
          fi
